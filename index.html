<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Overview</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="title">
            <h1>Dashboard Overview</h1>
            <div class="title-p">Quick summary of your stats.</div>
        </div>
        <div class="container">
            <div class="total-users">
                <div class="users-info">
                  <img src="Users.png" alt="users icon">
                  <h4 class="info-h4">Total Users</h4>
                </div>
                <div class="users-content">
                    <p class="bold">8,756</p>
                    <p class="gray-p">Active Members</p>
                </div>
            </div>
            <div class="revenue">
                <div class="revenue-info">
                    <img src="Revenue hero.png" alt="dolla sign logo black in color">
                    <h4 class="info-h4">Revenue</h4>
                </div>
                <div class="revenue-content">
                    <p class="bold">$13,250</p>
                    <p class="gray-p">This Month</p>
                </div>
            </div>
            <div class="recent-orders">
                <h4>Recent Orders</h4>
                <hr>
                <div class="order1">
                    <h5>Order #1030</h5>
                    <p class="gray-p">Steve Johnson</p>
                    <p class="order1-p">Pending</p>
                </div>
                <hr>
                <div class="order2">
                    <h5>Order #1029</h5>
                    <p class="gray-p">Sibusiso Cele</p>
                    <p class="order2-p">Completed</p>
                </div>
                <hr>
                <div class="order3">
                    <h5>Order #1028</h5>
                    <p class="gray-p">Ayanda Smith</p>
                    <p class="order3-p">Cancelled</p>
                </div>
                <hr>
                <div class="btn">
                    <button>View All</button>
                </div>
            </div>
            <div class="sales-analytics">
                <h4 class="info-h4">Sales Anaytics</h4>
                <div class="sa-content">
                    <h6 class="bold-h6">+20%</h6>
                    <p>This Week</p>
                </div>
                <div class="sa-chart">
                    <img class="sa-hero" src="chart.png" alt="increasing chart">
                </div>
            </div>
            <div class="task-list">
                <h4 class="info-h4">Task List</h4>
                <hr>
                <div class="tl-content">
                    <div class="check1">
                        <input type="checkbox" name="design" id="design">
                        <label for="design">Design new homepage</label>
                    </div>
                    <hr>
                    <div class="check2">
                        <input type="checkbox" name="debug" id="debug">
                        <label for="debug">Fix login bug</label>
                    </div>
                    <hr>
                    <div class="check3">
                        <input type="checkbox" name="update" id="update">
                        <label for="update">Update documentation</label>
                    </div>
                    <div class="btn">
                    <button>Add Task</button>
                </div>
                </div>
            </div>
        </div>
    </main>
    
</body>
</html>
